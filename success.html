<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🏛 購入完了 - Legacy Analyzer</title>
<style>
:root{--bg:#080c10;--text:#e0e0e0;--accent:#00d4ff;--success:#00c853}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0d1520;border:1px solid #1e3a5f;border-radius:16px;padding:40px;max-width:480px;width:100%;text-align:center}
.icon{font-size:3rem;margin-bottom:16px}
h1{color:var(--accent);font-size:1.5rem;margin-bottom:12px}
p{color:#aaa;font-size:.9rem;line-height:1.6;margin-bottom:20px}
.key-box{background:#1a1a2e;border:1px solid var(--accent);border-radius:8px;padding:16px;font-family:monospace;font-size:.95rem;color:var(--accent);letter-spacing:1px;word-break:break-all;margin-bottom:20px}
.btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#00d4ff,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;transition:.2s}
.btn:hover{opacity:.85}
.note{font-size:.78rem;color:#666;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🏛</div>
  <h1>ご購入ありがとうございます！</h1>
  <p>APIキーをご登録のメールアドレスに送信しました。<br>届いたキーをツールに入力してご利用ください。</p>
  <p style="color:#aaa;font-size:.85rem;">メールが届かない場合は迷惑メールフォルダをご確認ください。</p>
  <a href="https://furitsukatsuma.github.io/legacy-analyzer/" class="btn">🚀 ツールを開く</a>
  <p class="note">ご不明な点はお気軽にご連絡ください。</p>
</div>
</body>
</html>
